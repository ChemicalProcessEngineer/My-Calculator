<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Mechanics - Reynolds Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-[#003366] p-4 text-white">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-lg underline decoration-blue-400">ChemEng Hub</span>
            <a href="index.html" class="text-sm hover:underline">← Back to Dashboard</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10 px-6">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            
            <div class="bg-blue-600 p-8 text-white text-center">
                <h1 class="text-2xl font-bold mb-4">Reynolds Number Calculator</h1>
                <div class="bg-blue-700/50 p-4 rounded-lg inline-block">
                    <p class="text-sm text-blue-100 mb-2 font-mono uppercase tracking-widest">Governing Equation</p>
                    <div class="text-2xl font-serif">
                        $$Re = \frac{\rho \cdot u \cdot D}{\mu}$$
                    </div>
                </div>
            </div>

            <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <h3 class="font-bold text-gray-700 uppercase text-xs tracking-wider">Input Parameters</h3>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">DENSITY (ρ) [kg/m³]</label>
                        <input type="number" id="rho" value="1000" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">VELOCITY (u) [m/s]</label>
                        <input type="number" id="u" value="1.5" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-blue-500">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">PIPE DIAMETER (D)</label>
                        <div class="flex">
                            <input type="number" id="d_val" value="50" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-l-lg outline-none focus:border-blue-500">
                            <select id="d_unit" class="bg-gray-200 border border-gray-200 border-l-0 rounded-r-lg px-3 font-bold text-gray-600">
                                <option value="mm">mm</option>
                                <option value="m">m</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">VISCOSITY (μ) [Pa·s]</label>
                        <input type="number" id="mu" value="0.001" step="0.0001" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:border-blue-500">
                    </div>

                    <button onclick="calculate()" class="w-full bg-[#003366] hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                        Run Calculation
                    </button>
                </div>

                <div class="bg-gray-50 p-8 rounded-2xl flex flex-col justify-center items-center text-center border border-gray-100">
                    <div id="output-box" class="hidden">
                        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-2">Calculated Re</p>
                        <h2 id="re-val" class="text-6xl font-black text-[#003366] mb-4">--</h2>
                        <div id="regime-tag" class="px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest">--</div>
                        
                        <div class="mt-8 text-left bg-white p-4 rounded-lg border text-xs text-gray-500">
                            <strong>Note:</strong> Re < 2100 is Laminar, Re > 4000 is Turbulent.
                        </div>
                    </div>
                    <div id="placeholder">
                        <div class="animate-pulse text-gray-300">
                            <span class="material-icons text-64px">analytics</span>
                            <p>Enter values and click "Run"</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculate() {
            const rho = parseFloat(document.getElementById('rho').value);
            const u = parseFloat(document.getElementById('u').value);
            const mu = parseFloat(document.getElementById('mu').value);
            
            // Get diameter and handle unit conversion
            let d = parseFloat(document.getElementById('d_val').value);
            const unit = document.getElementById('d_unit').value;
            
            if (unit === "mm") {
                d = d / 1000; // Convert mm to meters for the formula
            }

            const re = (rho * u * d) / mu;

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('output-box').classList.remove('hidden');
            document.getElementById('re-val').innerText = Math.round(re).toLocaleString();

            const tag = document.getElementById('regime-tag');
            if (re < 2100) {
                tag.innerText = "Laminar Flow";
                tag.className = "px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest bg-green-100 text-green-700";
            } else if (re <= 4000) {
                tag.innerText = "Transitional Flow";
                tag.className = "px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest bg-yellow-100 text-yellow-700";
            } else {
                tag.innerText = "Turbulent Flow";
                tag.className = "px-6 py-2 rounded-full text-sm font-black uppercase tracking-widest bg-red-100 text-red-700";
            }
        }
    </script>
</body>
</html>
