<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Mechanics - Reynolds Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-[#003366] p-4 text-white">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold">ChemEng Hub</span>
            <a href="index.html" class="text-sm hover:underline">← Back to Dashboard</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10 px-6">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-blue-600 p-6 text-white text-center">
                <h1 class="text-2xl font-bold">Reynolds Number & Flow Regime</h1>
                <p class="text-blue-100 text-sm">Determine if your flow is Laminar, Transitional, or Turbulent</p>
            </div>

            <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h3 class="font-semibold text-gray-700 border-b pb-2">Input Parameters</h3>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Density (ρ) [kg/m³]</label>
                        <input type="number" id="rho" value="1000" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Velocity (u) [m/s]</label>
                        <input type="number" id="u" value="1.5" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Pipe Diameter (D) [m]</label>
                        <input type="number" id="d" value="0.05" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Viscosity (μ) [Pa·s]</label>
                        <input type="number" id="mu" value="0.001" step="0.0001" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <button onclick="calculateReynolds()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors">
                        Calculate Result
                    </button>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl flex flex-col justify-center items-center text-center border-2 border-dashed border-gray-200">
                    <div id="output-box" class="hidden">
                        <p class="text-gray-500 text-sm uppercase font-bold">Reynolds Number (Re)</p>
                        <h2 id="re-val" class="text-5xl font-black text-blue-600 my-2">--</h2>
                        <div id="regime-tag" class="px-4 py-1 rounded-full text-sm font-bold inline-block mt-2">--</div>
                    </div>
                    <div id="placeholder">
                        <p class="text-gray-400">Enter values and click calculate to see the flow regime.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function calculateReynolds() {
            const rho = parseFloat(document.getElementById('rho').value);
            const u = parseFloat(document.getElementById('u').value);
            const d = parseFloat(document.getElementById('d').value);
            const mu = parseFloat(document.getElementById('mu').value);

            // Re = (rho * u * d) / mu
            const re = (rho * u * d) / mu;

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('output-box').classList.remove('hidden');
            document.getElementById('re-val').innerText = re.toLocaleString(undefined, {maximumFractionDigits: 0});

            const tag = document.getElementById('regime-tag');
            if (re < 2100) {
                tag.innerText = "LAMINAR";
                tag.className = "px-4 py-1 rounded-full text-sm font-bold inline-block mt-2 bg-green-100 text-green-700";
            } else if (re >= 2100 && re <= 4000) {
                tag.innerText = "TRANSITIONAL";
                tag.className = "px-4 py-1 rounded-full text-sm font-bold inline-block mt-2 bg-yellow-100 text-yellow-700";
            } else {
                tag.innerText = "TURBULENT";
                tag.className = "px-4 py-1 rounded-full text-sm font-bold inline-block mt-2 bg-red-100 text-red-700";
            }
        }
    </script>
</body>
</html>
