<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressure Drop | Process Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .sidebar-open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white border-b p-4 flex items-center shadow-sm z-40 fixed w-full">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg transition-all mr-4 flex items-center">
            <span class="material-icons text-slate-600">menu</span>
            <span class="ml-2 text-xs font-black uppercase text-slate-400">Menu</span>
        </button>
        <h1 class="font-[900] text-slate-800 uppercase tracking-tighter text-xl">Process <span class="text-blue-600">Pro</span></h1>
    </nav>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-[#0a192f] text-white z-50 sidebar-closed shadow-2xl">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter">Navigation</h1>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white"><span class="material-icons">close</span></button>
        </div>
        <nav class="p-6 space-y-6">
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Main</p>
                <a href="index.html" class="flex items-center text-slate-300 hover:text-white font-bold py-2 transition-all">
                    <span class="material-icons mr-3 text-sm">dashboard</span> Dashboard
                </a>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Fluid Mechanics</p>
                <a href="reynolds.html" class="flex items-center text-slate-400 hover:text-white font-bold py-2 pl-3 transition-all">
                    <span class="material-icons mr-3 text-sm text-blue-500">speed</span> Reynolds Number
                </a>
                <a href="pressure-drop.html" class="flex items-center text-blue-400 font-black py-2 border-l-2 border-blue-400 pl-3">
                    <span class="material-icons mr-3 text-sm">compress</span> Pressure Drop
                </a>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Calculators</p>
                <a href="unit-converter.html" class="flex items-center text-slate-300 hover:text-white font-bold py-2 transition-all">
                    <span class="material-icons mr-3 text-sm">sync_alt</span> Unit Converter
                </a>
            </div>
        </nav>
    </aside>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <main class="flex-1 pt-32 pb-20 flex flex-col items-center px-6">
        <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
            <div class="h-2 bg-green-600"></div>
            <div class="p-10">
                <h2 class="text-3xl font-[900] text-slate-800 mb-8 uppercase tracking-tight italic">Pressure Drop</h2>
                <p class="text-slate-400 text-sm">Enter Reynolds and Geometry to calculate losses.</p>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
