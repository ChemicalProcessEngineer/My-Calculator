<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pressure Drop Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border-t-8 border-green-600">
        <a href="fluid-mechanics.html" class="text-xs text-green-600 hover:underline">← Back to Fluid Tools</a>
        <h2 class="text-2xl font-black mt-4 mb-6 uppercase text-green-900">Pressure & Head Loss</h2>
        
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">REYNOLDS NO.</label>
                    <input type="number" id="re" value="5000" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">LENGTH (m)</label>
                    <input type="number" id="l" value="10" class="w-full p-2 border rounded">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">DIAMETER (mm)</label>
                <input type="number" id="d" value="50" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">DENSITY (kg/m³)</label>
                <input type="number" id="rho" value="1000" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">VELOCITY (m/s)</label>
                <input type="number" id="u" value="2" class="w-full p-2 border rounded">
            </div>
            <button onclick="calc()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">Calculate Loss</button>
            
            <div id="res_box" class="mt-6 grid grid-cols-2 gap-4 hidden">
                <div class="bg-green-50 p-4 rounded-xl text-center">
                    <p class="text-[10px] font-bold text-green-600">PRESSURE DROP (Pa)</p>
                    <h3 id="dp_val" class="text-2xl font-black text-green-900">--</h3>
                </div>
                <div class="bg-orange-50 p-4 rounded-xl text-center">
                    <p class="text-[10px] font-bold text-orange-600">HEAD LOSS (m)</p>
                    <h3 id="hl_val" class="text-2xl font-black text-orange-900">--</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const re = parseFloat(document.getElementById('re').value);
            const l = parseFloat(document.getElementById('l').value);
            const d = parseFloat(document.getElementById('d').value) / 1000;
            const rho = parseFloat(document.getElementById('rho').value);
            const u = parseFloat(document.getElementById('u').value);
            const g = 9.81;

            let f = (re < 2100) ? (64/re) : 0.316 * Math.pow(re, -0.25); // Simple Blasius for turbulent
            const hl = f * (l/d) * (Math.pow(u,2)/(2*g));
            const dp = rho * g * hl;

            document.getElementById('res_box').classList.remove('hidden');
            document.getElementById('dp_val').innerText = Math.round(dp).toLocaleString();
            document.getElementById('hl_val').innerText = hl.toFixed(3);
        }
    </script>
</body>
</html>
