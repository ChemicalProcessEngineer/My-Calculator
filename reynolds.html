<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reynolds Number | Process Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-closed { transform: translateX(-100%); }
        .sidebar-open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white border-b p-4 flex items-center shadow-sm z-40 fixed w-full">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg transition-all mr-4 flex items-center">
            <span class="material-icons text-slate-600">menu</span>
            <span class="ml-2 text-[10px] font-black uppercase text-slate-400 tracking-widest">Menu</span>
        </button>
        <h1 class="font-[900] text-slate-800 uppercase tracking-tighter text-xl italic">Process <span class="text-blue-600">Pro</span></h1>
    </nav>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-[#0a192f] text-white z-50 sidebar-closed shadow-2xl overflow-y-auto">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter">Navigation</h1>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white"><span class="material-icons">close</span></button>
        </div>
        
        <nav class="p-6">
            <div class="mb-10">
                <a href="index.html" class="flex items-center justify-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 hover:bg-white/20 text-white font-black py-3 rounded-2xl transition-all shadow-lg active:scale-95 text-[11px] uppercase tracking-widest">
                    <span class="material-icons text-sm">arrow_back</span>
                    Dashboard
                </a>
            </div>

            <div class="space-y-8">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Fluid Mechanics</p>
                    <a href="reynolds.html" class="flex items-center text-blue-400 font-black py-2 border-l-2 border-blue-400 pl-3">
                        <span class="material-icons mr-3 text-sm">speed</span> Reynolds Number
                    </a>
                    <a href="pressure-drop.html" class="flex items-center text-slate-400 hover:text-white font-bold py-2 pl-3 mt-2 transition-all">
                        <span class="material-icons mr-3 text-sm">compress</span> Pressure Drop
                    </a>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Utility</p>
                    <a href="unit-converter.html" class="flex items-center text-slate-300 hover:text-white font-bold py-2 transition-all">
                        <span class="material-icons mr-3 text-sm">sync_alt</span> Unit Converter
                    </a>
                </div>
            </div>
        </nav>
    </aside>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <main class="flex-1 pt-32 pb-20 flex flex-col items-center px-6">
        <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
            <div class="h-2 bg-blue-600"></div>
            <div class="p-10">
                <h2 class="text-3xl font-[900] text-slate-800 mb-8 uppercase tracking-tight italic">Reynolds Number</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Density (kg/m³)</label>
                        <input type="number" id="rho" value="1000" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Velocity (m/s)</label>
                        <input type="number" id="u" value="1.0" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Diameter (mm)</label>
                        <input type="number" id="d" value="50" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Viscosity (Pa·s)</label>
                        <input type="number" id="mu" value="0.001" step="0.0001" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700">
                    </div>
                    <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg transition-all transform active:scale-95 uppercase tracking-[0.2em] mt-4">Calculate Re</button>
                    <div id="resultBox" class="hidden mt-8 p-8 bg-blue-50 rounded-[2rem] border border-blue-100 text-center animate-in fade-in zoom-in duration-300">
                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Resulting Reynolds Number</p>
                        <h3 id="reVal" class="text-5xl font-[900] text-blue-900 my-3 tracking-tighter">--</h3>
                        <div id="reTag" class="inline-block px-6 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">--</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('hidden');
        }
        function calculate() {
            const rho = parseFloat(document.getElementById('rho').value);
            const u = parseFloat(document.getElementById('u').value);
            const d = parseFloat(document.getElementById('d').value) / 1000;
            const mu = parseFloat(document.getElementById('mu').value);
            const re = (rho * u * d) / mu;
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('reVal').innerText = Math.round(re).toLocaleString();
            const tag = document.getElementById('reTag');
            if (re < 2100) { tag.innerText = "Laminar"; tag.className = "inline-block px-6 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-green-100 text-green-700"; }
            else if (re <= 4000) { tag.innerText = "Transitional"; tag.className = "inline-block px-6 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-yellow-100 text-yellow-700"; }
            else { tag.innerText = "Turbulent"; tag.className = "inline-block px-6 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-red-100 text-red-700"; }
        }
    </script>
</body>
</html>
