<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engineering Unit Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border-t-8 border-orange-500">
        <a href="index.html" class="text-xs text-orange-600 hover:underline">← Back to Dashboard</a>
        <h2 class="text-2xl font-black mt-4 mb-6 uppercase text-gray-800 tracking-tight">Unit Converter</h2>
        
        <div class="space-y-6">
            <div class="p-4 bg-orange-50 rounded-xl border border-orange-100">
                <label class="block text-xs font-bold text-orange-600 uppercase mb-2">Pressure (bar to Pa)</label>
                <div class="flex gap-2">
                    <input type="number" id="bar" placeholder="bar" oninput="convP()" class="w-1/2 p-2 border rounded-lg outline-none focus:border-orange-500">
                    <div class="flex items-center text-orange-300">→</div>
                    <input type="text" id="pa" readonly placeholder="Pascal" class="w-1/2 p-2 bg-white border rounded-lg font-bold text-orange-900">
                </div>
            </div>

            <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                <label class="block text-xs font-bold text-blue-600 uppercase mb-2">Temp (°C to Kelvin)</label>
                <div class="flex gap-2">
                    <input type="number" id="celsius" placeholder="°C" oninput="convT()" class="w-1/2 p-2 border rounded-lg outline-none focus:border-blue-500">
                    <div class="flex items-center text-blue-300">→</div>
                    <input type="text" id="kelvin" readonly placeholder="Kelvin" class="w-1/2 p-2 bg-white border rounded-lg font-bold text-blue-900">
                </div>
            </div>
        </div>
    </div>

    <script>
        function convP() {
            const bar = document.getElementById('bar').value;
            document.getElementById('pa').value = bar ? (bar * 100000).toLocaleString() + " Pa" : "";
        }
        function convT() {
            const c = document.getElementById('celsius').value;
            document.getElementById('kelvin').value = c ? (parseFloat(c) + 273.15).toFixed(2) + " K" : "";
        }
    </script>
</body>
</html>
