<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter Hub | Process Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Sidebar transition */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-closed { transform: translateX(-100%); }
        .sidebar-open { transform: translateX(0); }

        /* Submenu transition logic */
        .submenu { transition: all 0.3s ease-in-out; overflow: hidden; }
        .submenu.hidden { display: none; }

        /* Professional Tab Highlighting */
        .tab-active { 
            border-color: #2563eb !important; 
            color: #2563eb !important; 
            background-color: #eff6ff !important; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1); 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white border-b p-4 flex items-center shadow-sm z-40 fixed w-full">
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg transition-all mr-4 flex items-center">
            <span class="material-icons text-slate-600">menu</span>
            <span class="ml-2 text-[10px] font-black uppercase text-slate-400 tracking-widest">Menu</span>
        </button>
        <h1 class="font-[900] text-slate-800 uppercase tracking-tighter text-xl italic">Process <span class="text-blue-600">Pro</span></h1>
    </nav>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-[#0a192f] text-white z-50 sidebar-closed shadow-2xl overflow-y-auto">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-400 uppercase tracking-tighter italic">Navigation</h1>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white">
                <span class="material-icons">close</span>
            </button>
        </div>
        
        <nav class="p-6">
            <div class="mb-10">
                <a href="index.html" class="flex items-center justify-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 hover:bg-white/20 text-white font-black py-3 rounded-2xl transition-all shadow-lg active:scale-95 text-[11px] uppercase tracking-widest">
                    <span class="material-icons text-sm">arrow_back</span>
                    Dashboard
                </a>
            </div>

            <div class="space-y-4">
                <div>
                    <button onclick="toggleMenu('fluid-menu', 'fluid-arrow')" class="w-full flex justify-between items-center p-3 rounded-xl hover:bg-white/5 transition-all text-left">
                        <div class="flex items-center">
                            <span class="material-icons text-blue-500 mr-3 text-sm">water_drop</span>
                            <span class="text-sm font-bold">Fluid Mechanics</span>
                        </div>
                        <span class="material-icons text-sm transition-transform" id="fluid-arrow">expand_more</span>
                    </button>
                    <div id="fluid-menu" class="submenu hidden pl-10 space-y-2 mt-2 border-l border-white/10 ml-6">
                        <a href="reynolds.html" class="block text-xs text-slate-400 hover:text-white py-2 transition-all">Reynolds Number</a>
                        <a href="pressure-drop.html" class="block text-xs text-slate-400 hover:text-white py-2 transition-all">Pressure & Head</a>
                    </div>
                </div>

                <div>
                    <button onclick="toggleMenu('unit-menu', 'unit-arrow')" class="w-full flex justify-between items-center p-3 rounded-xl hover:bg-white/5 transition-all text-left">
                        <div class="flex items-center">
                            <span class="material-icons text-orange-500 mr-3 text-sm">sync_alt</span>
                            <span class="text-sm font-bold">Unit Converter</span>
                        </div>
                        <span class="material-icons text-sm transition-transform" id="unit-arrow">expand_more</span>
                    </button>
                    <div id="unit-menu" class="submenu pl-10 space-y-2 mt-2 border-l border-white/10 ml-6">
                        <a href="unit-converter.html" class="block text-xs text-blue-400 font-bold py-2 border-l-2 border-blue-400 pl-2">Main Hub</a>
                    </div>
                </div>

                <div class="flex items-center p-3 text-slate-600 cursor-not-allowed opacity-40">
                    <span class="material-icons mr-3 text-sm">thermostat</span>
                    <span class="text-sm font-bold">Heat Transfer</span>
                    <span class="material-icons text-xs ml-auto">lock</span>
                </div>
            </div>
        </nav>
    </aside>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <main class="flex-1 pt-32 pb-20 flex flex-col items-center px-6">
        <div class="max-w-4xl w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
            <div class="h-2 bg-orange-500"></div>
            <div class="p-10">
                
                <div class="mb-4">
                    <a href="index.html" class="text-[#10b981] text-sm font-medium hover:underline flex items-center transition-all">
                        <span class="mr-1">←</span> Back to Unit Converters
                    </a>
                </div>

                <h2 class="text-3xl font-[900] text-slate-800 mb-8 uppercase tracking-tight italic">Unit Converter Hub</h2>

                <div class="flex flex-wrap gap-2 mb-8" id="tabContainer">
                    <button onclick="changeCat('pressure', this)" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border-2 transition-all tab-active">Pressure</button>
                    <button onclick="changeCat('temp', this)" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border-2 border-slate-100 text-slate-400 transition-all hover:bg-slate-50">Temperature</button>
                    <button onclick="changeCat('viscosity', this)" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border-2 border-slate-100 text-slate-400 transition-all hover:bg-slate-50">Viscosity</button>
                    <button onclick="changeCat('length', this)" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border-2 border-slate-100 text-slate-400 transition-all hover:bg-slate-50">Length</button>
                    <button onclick="changeCat('mass', this)" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border-2 border-slate-100 text-slate-400 transition-all hover:bg-slate-50">Mass</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Value</label>
                        <input type="number" id="inputVal" value="1" oninput="convert()" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700 text-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">From Unit</label>
                        <select id="fromUnit" onchange="convert()" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700"></select>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-[2rem] p-8 border border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 tracking-widest">Equivalents Table</p>
                    <div id="resultGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const data = {
            pressure: { "Pa": 1, "kPa": 1000, "MPa": 1000000, "bar": 100000, "atm": 101325, "psi": 6894.76, "kg/cm²": 98066.5, "mmHg": 133.322, "inWC": 249.089 },
            temp: { "°C": "c", "K": "k", "°F": "f", "°R": "r" },
            viscosity: { "Pa·s": 1, "cP": 0.001, "P": 0.1, "lb/ft·s": 1.48816 },
            length: { "m": 1, "mm": 0.001, "cm": 0.01, "inch": 0.0254, "ft": 0.3048, "km": 1000 },
            mass: { "kg": 1, "g": 0.001, "lb": 0.453592, "oz": 0.0283495, "ton": 1000 }
        };

        let currentCat = 'pressure';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('sidebar').classList.toggle('sidebar-open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleMenu(menuId, arrowId) {
            const menu = document.getElementById(menuId);
            const arrow = document.getElementById(arrowId);
            menu.classList.toggle('hidden');
            if (menu.classList.contains('hidden')) {
                arrow.style.transform = 'rotate(0deg)';
            } else {
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        function changeCat(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('tab-active', 'text-blue-600', 'border-blue-600');
                b.classList.add('border-slate-100', 'text-slate-400');
            });
            btn.classList.add('tab-active', 'text-blue-600', 'border-blue-600');
            btn.classList.remove('border-slate-100', 'text-slate-400');
            
            const sel = document.getElementById('fromUnit');
            sel.innerHTML = "";
            Object.keys(data[cat]).forEach(u => sel.add(new Option(u, u)));
            convert();
        }

        function convert() {
            const val = parseFloat(document.getElementById('inputVal').value) || 0;
            const from = document.getElementById('fromUnit').value;
            const grid = document.getElementById('resultGrid');
            grid.innerHTML = "";

            if (currentCat === 'temp') {
                let baseC;
                if (from === "°C") baseC = val;
                else if (from === "K") baseC = val - 273.15;
                else if (from === "°F") baseC = (val - 32) * 5/9;
                else if (from === "°R") baseC = (val - 491.67) * 5/9;
                const res = { "°C": baseC, "K": baseC + 273.15, "°F": (baseC * 9/5) + 32, "°R": (baseC + 273.15) * 1.8 };
                Object.entries(res).forEach(([u, v]) => grid.innerHTML += card(u, v.toFixed(2)));
            } else {
                const baseVal = val * data[currentCat][from];
                Object.entries(data[currentCat]).forEach(([u, f]) => {
                    grid.innerHTML += card(u, (baseVal / f).toLocaleString(undefined, {maximumFractionDigits: 5}));
                });
            }
        }

        function card(u, v) {
            return `<div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex flex-col hover:border-blue-200 transition-all text-left">
                <span class="text-[9px] font-black text-slate-300 uppercase mb-1">${u}</span>
                <span class="text-md font-black text-slate-800 break-all tracking-tight">${v}</span>
            </div>`;
        }

        window.onload = () => {
            changeCat('pressure', document.querySelector('.tab-btn'));
            const arrow = document.getElementById('unit-arrow');
            arrow.style.transform = 'rotate(180deg)';
        };
    </script>
</body>
</html>
