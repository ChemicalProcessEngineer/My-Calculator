<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressure Converter - Pro Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border">
        <div class="bg-[#003366] p-6 text-white flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold">Pressure Converter</h2>
                <p class="text-blue-200 text-xs">Professional Engineering Unit Tool</p>
            </div>
            <a href="index.html" class="text-xs bg-white/10 px-3 py-1 rounded hover:bg-white/20">Dashboard</a>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">Value to Convert</label>
                    <input type="number" id="inputVal" value="101325" oninput="convert()" class="w-full p-3 border-2 border-gray-100 rounded-lg focus:border-blue-500 outline-none text-xl font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">From Unit</label>
                    <select id="fromUnit" onchange="convert()" class="w-full p-3 border-2 border-gray-100 rounded-lg bg-white outline-none focus:border-blue-500">
                        </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-400 mb-1 uppercase">To Unit</label>
                    <select id="toUnit" onchange="convert()" class="w-full p-3 border-2 border-gray-100 rounded-lg bg-white outline-none focus:border-blue-500">
                        </select>
                </div>
            </div>

            <div class="flex gap-4 mb-8">
                <button onclick="swap()" class="bg-blue-100 text-blue-700 px-6 py-2 rounded font-bold hover:bg-blue-200">Swap Units</button>
                <button onclick="reset()" class="bg-red-100 text-red-700 px-6 py-2 rounded font-bold hover:bg-red-200">Reset</button>
            </div>

            <div id="resultBanner" class="bg-blue-50 border-l-8 border-blue-600 p-4 mb-8">
                <p id="mainResult" class="text-blue-900 font-bold text-lg">Enter values to convert...</p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-[#003366] text-white">
                            <th class="p-3 text-left">Unit</th>
                            <th class="p-3 text-right">Value</th>
                        </tr>
                    </thead>
                    <tbody id="unitTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Unit factors relative to 1 Pascal (Pa)
        const factors = {
            "Pa": 1,
            "kPa": 1000,
            "MPa": 1000000,
            "bar": 100000,
            "atm": 101325,
            "psi": 6894.76,
            "kg/cm2": 98066.5,
            "kg/m2": 9.80665,
            "mmHg": 133.322,
            "Torr": 133.322,
            "inHg": 3386.39,
            "mmWC": 9.80665,
            "inWC": 249.089
        };

        // Initialize Selectors
        const fromSelect = document.getElementById('fromUnit');
        const toSelect = document.getElementById('toUnit');
        
        Object.keys(factors).forEach(unit => {
            fromSelect.add(new Option(unit, unit));
            toSelect.add(new Option(unit, unit));
        });

        function convert() {
            const val = parseFloat(document.getElementById('inputVal').value);
            const from = fromSelect.value;
            const to = toSelect.value;

            if (isNaN(val)) return;

            // Step 1: Convert input to Pascal
            const pa = val * factors[from];

            // Step 2: Update Main Result
            const result = pa / factors[to];
            document.getElementById('mainResult').innerText = `${val} ${from} = ${result.toFixed(6)} ${to}`;

            // Step 3: Update Table
            const tbody = document.getElementById('unitTable');
            tbody.innerHTML = "";
            
            Object.keys(factors).forEach(unit => {
                const rowVal = pa / factors[unit];
                const row = `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-bold text-gray-700">${unit}</td>
                    <td class="p-3 text-right font-mono">${rowVal.toFixed(6)}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function swap() {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            convert();
        }

        function reset() {
            document.getElementById('inputVal').value = 0;
            convert();
        }

        // Run on load
        convert();
    </script>
</body>
</html>
